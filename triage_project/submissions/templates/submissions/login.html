<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judge Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white mb-2"><span class="text-indigo-500">Judge</span> Portal</h1>
            <p class="text-slate-400 text-sm">Sign in to evaluate hackathon projects</p>
        </div>

        <form method="POST" action="{% url 'login' %}" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-slate-300 text-sm font-bold mb-2">Username</label>
                <input type="text" name="username" class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg p-3 focus:outline-none focus:border-indigo-500" required>
            </div>

            <div>
                <label class="block text-slate-300 text-sm font-bold mb-2">Password</label>
                <input type="password" name="password" class="w-full bg-slate-900 border border-slate-600 text-white rounded-lg p-3 focus:outline-none focus:border-indigo-500" required>
            </div>

            <!-- Hidden input that tells Django where to redirect after login -->
            <input type="hidden" name="next" value="{% url 'judge_dashboard' %}">

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg transition-colors">
                Sign In
            </button>
            
            {% if form.errors %}
                <p class="text-red-400 text-sm text-center mt-4">Invalid username or password.</p>
            {% endif %}
        </form>
    </div>

</body>
</html>
